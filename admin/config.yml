backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "grow-journal"
    label: "Grow Journal"
    folder: "_posts/grow-journal"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Strain", name: "strain", widget: "string" }
      - { label: "Stage", name: "stage", widget: "select", options: ["Germination", "Seedling", "Vegetative", "Flowering", "Harvest", "Curing"] }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
