backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "grow-journal"
    label: "Grow Journal"
    folder: "_posts/grow-journal"
    create: true
    slug: "cycle-{{cycle}}-day-{{day}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Cycle", name: "cycle", widget: "number", default: 4, hint: "Current grow cycle (e.g., 3, 4)" }
      - { label: "Day", name: "day", widget: "number", hint: "Day number of the grow" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Strain", name: "strain", widget: "string" }
      - { label: "Stage", name: "stage", widget: "select", options: ["Germination", "Seedling", "Vegetative", "Flowering", "Harvest", "Curing"] }
      - { label: "Height (inches)", name: "height", widget: "number", required: false, value_type: "float" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "sandwiches"
    label: "Sandwich Adventures"
    folder: "_posts/sandwiches"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Bull Rating", name: "rating", widget: "number", value_type: "float", min: 0, max: 10, step: 0.1 }
      - { label: "Rank", name: "rank", widget: "number", hint: "Rank in the Hall of Fame (1-5)" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
